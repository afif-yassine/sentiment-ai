version: '3.9'

services:
  sentiment-ai:
    build: .
    container_name: sentiment-staging
    ports:
      - "8080:8000"   # hote:conteneur
    environment:
      - ENV=development
    networks:
      - cicd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s       # frequence des verifications
      timeout: 10s        # delai max avant echec
      retries: 3          # nombre d'echecs avant "unhealthy"
      start_period: 10s   # delai de grace au demarrage

# Reseau dedie : Jenkins et SonarQube le rejoindront dans les TPs suivants
networks:
  cicd-network:
    driver: bridge
